<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="CCCC flashcard app for the Taiwan Children's Chinese Competency Certificate vocabulary list.">
  <title>Mandarin Flashcards</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css?v=20260617-2">
</head>

<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" aria-live="polite">
    <span style="font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--text-2); letter-spacing: 0.1em;">載入中</span>
  </div>

  <!-- Welcome / Sign-in overlay -->
  <div id="welcome-overlay" class="welcome-overlay hidden" role="dialog" aria-modal="true" aria-label="Sign in">
    <div class="welcome-card">
      <div class="welcome-hanzi" aria-hidden="true" lang="zh-Hant">學</div>
      <h1 class="welcome-title">Mandarin Flashcards</h1>
      <p class="welcome-sub" lang="zh-Hant">CCCC · 台灣華語文能力測驗</p>
      <button id="welcome-google-btn" class="google-signin-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <button id="welcome-guest-btn" class="welcome-guest-btn">Continue without account</button>
      <p class="welcome-note">Sign in to save your progress across devices</p>
    </div>
  </div>

  <!-- Header (always visible) -->
  <header id="app-header">
    <div class="header-inner">
      <div class="header-left">
        <button id="back-btn" class="icon-btn hidden" aria-label="Back to levels"></button>
        <h1 class="app-title">Mandarin Flashcards</h1>
      </div>
      <div class="header-right">
        <button id="shuffle-btn" class="icon-btn hidden" aria-label="Toggle shuffle" title="Shuffle cards"></button>
        <button id="theme-btn" class="icon-btn" aria-label="Toggle dark mode"></button>
        <button id="auth-btn" class="auth-btn hidden" aria-label="Sign in with Google">Sign in</button>
      </div>
    </div>
  </header>

  <!-- ── Home screen ── -->
  <main id="home-screen" class="screen active" aria-label="Level selection">
    <div id="home-inner" class="home-inner">
      <p class="home-heading" lang="zh-Hant">選擇等級</p>
      <p class="home-subheading">Choose a level to begin studying</p>
      <div id="level-grid" class="level-grid">
        <!-- Level cards rendered by app.js -->
      </div>
    </div>
  </main>

  <!-- ── Flashcard screen ── -->
  <main id="card-screen" class="screen" aria-label="Flashcard study">

    <!-- Progress -->
    <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <p class="progress-label" id="progress-label" aria-live="polite"></p>
    <div class="mobile-card-category" id="mobile-card-category" aria-live="polite"></div>

    <!-- Card + side arrows -->
    <div class="card-area">
      <button class="action-btn nav-btn" id="prev-btn" aria-label="Previous card" title="Previous (←)"></button>

      <div class="card-column">
        <div class="card-scene" id="card-scene" aria-label="Flashcard">
          <div class="card-inner" id="card-inner" role="button" tabindex="0" aria-label="Tap to flip card">

            <!-- Front face -->
            <div class="card-face card-front" aria-hidden="false">
              <div class="front-category-badge" id="front-category" aria-label="Category"></div>
              <div class="char-display" id="front-char" lang="zh-Hant"></div>
              <div class="front-pinyin" id="front-pinyin" aria-live="polite"></div>
              <button class="pinyin-btn" id="pinyin-btn" aria-label="Show pinyin"></button>
            </div>

            <!-- Back face -->
            <div class="card-face card-back" aria-hidden="true">
              <div class="back-char" id="back-char" lang="zh-Hant"></div>
              <div class="back-pinyin" id="back-pinyin"></div>
              <div class="back-english" id="back-english" lang="en"></div>
              <div class="back-meta">
                <span class="pos-badge" id="back-pos"></span>
                <div class="back-category" id="back-category"></div>
              </div>
            </div>

          </div>
        </div><!-- /card-scene -->

        <div class="mobile-card-pinyin" id="mobile-card-pinyin" aria-live="polite"></div>
      </div>

      <button class="action-btn nav-btn" id="next-btn" aria-label="Next card" title="Next (→)"></button>
    </div><!-- /card-area -->

    <!-- Again / Known -->
    <div class="card-actions" role="group" aria-label="Card actions">
      <button class="action-btn again-btn" id="again-btn" aria-label="Mark as didn't know" title="Didn't know (1)">Again</button>
      <button class="action-btn known-btn" id="known-btn" aria-label="Mark as known" title="I know it (2)">Known</button>
    </div>

    <p class="today-counter" id="today-counter" aria-live="polite"></p>
  </main>

  <!-- Sync indicator -->
  <div class="sync-indicator" id="sync-indicator" aria-live="polite"></div>

  <!-- Firebase config -->
  <script>
    window.firebaseConfig = {
      apiKey:            "AIzaSyDxKZBN89t__HHpeXiCtXLmLlXSXCdYBJA",
      authDomain:        "mandarin-flashcard-a1ac3.firebaseapp.com",
      projectId:         "mandarin-flashcard-a1ac3",
      storageBucket:     "mandarin-flashcard-a1ac3.firebasestorage.app",
      messagingSenderId: "795357882034",
      appId:             "1:795357882034:web:00432ffa2cc9c0f77f8bab",
    };
  </script>

  <script type="module" src="app.js?v=20260617-2"></script>
</body>
</html>
